name: mle
description: "MLE (Mas Leipei Enas / 'we're one short') — fill open spots in pickup sports games."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  cloud_functions: ^5.1.3

  # Auth providers
  google_sign_in: ^6.2.1

  # Maps
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1

  # State management (lightweight, good enough for v1)
  provider: ^6.1.2

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
